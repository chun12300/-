<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>塔羅占卜 · Xuanyi Mingli</title>
<link rel="stylesheet" href="style.css">
<style>
  .cards-area {
    display: flex;
    gap: 16px;
    justify-content: center;
    margin-top: 28px;
    flex-wrap: wrap;
  }
  .tarot-card {
    width: 160px;
    height: 240px;
    perspective: 1000px;
    cursor: pointer;
  }
  .tarot-card .inner {
    position: relative;
    width: 100%;
    height: 100%;
    transition: transform 0.7s cubic-bezier(.3,.9,.4,1);
    transform-style: preserve-3d;
  }
  .tarot-card.flipped .inner { transform: rotateY(180deg); }
  .tarot-card .face {
    position: absolute;
    inset: 0;
    border-radius: 14px;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 12px;
  }
  .tarot-card .front {
    background: linear-gradient(160deg, var(--bg-panel-2), var(--bg-panel));
    border: 2px solid var(--gold);
  }
  .tarot-card .front span {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 48px;
    color: var(--gold-light);
    opacity: 0.85;
  }
  .tarot-card .back {
    transform: rotateY(180deg);
    gap: 8px;
    border-width: 2px;
    border-style: solid;
  }
  .tarot-card .back .glyph {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 40px;
  }
  .tarot-card .back .cname {
    font-family: 'Noto Serif TC', serif;
    font-size: 19px;
    font-weight: 700;
  }

  .back.angel   { background: linear-gradient(160deg, #2a2f4a, #161d33); border-color: #e6cf8a; }
  .back.angel   .glyph, .back.angel .cname { color: #e6cf8a; }

  .back.devil   { background: linear-gradient(160deg, #3a1620, #1c0f16); border-color: #c14652; }
  .back.devil   .glyph, .back.devil .cname { color: #f2848d; }

  .back.poverty { background: linear-gradient(160deg, #24283a, #14171f); border-color: #6b7280; }
  .back.poverty .glyph, .back.poverty .cname { color: #9aa3b5; }

  .back.wealth  { background: linear-gradient(160deg, #3a2a10, #201607); border-color: #d8a930; }
  .back.wealth  .glyph, .back.wealth .cname { color: #f2c85b; }

  .meanings {
    margin-top: 26px;
  }
  .meaning-item {
    border-top: 1px dashed rgba(201,162,74,0.18);
    padding: 14px 0;
  }
  .meaning-item .head {
    font-family: 'Noto Serif TC', serif;
    color: var(--gold-light);
    margin-bottom: 6px;
    font-size: 17px;
  }
  .meaning-item .body {
    font-size: 14.5px;
    line-height: 1.8;
    color: var(--ink);
  }
</style>
</head>
<body>
<div class="page">

  <div class="topbar">
    <div>
      <div class="logo brush">玄怡命理</div>
      <div style="font-size:12px;color:var(--muted);letter-spacing:0.1em;">XUANYI MINGLI</div>
    </div>
    <a class="back" href="index.html">← 返回</a>
  </div>

  <div class="card">
    <h1>塔羅占卜</h1>
    <p style="color:var(--muted);line-height:1.8;">
      在心中默想你想探問的問題,點擊下方按鈕抽出一張牌,再輕輕點擊卡片翻開。
    </p>

    <div style="text-align:center;margin-top:20px;">
      <button class="btn" onclick="drawCard()">開始抽牌</button>
    </div>

    <div class="cards-area" id="cardsArea"></div>

    <div class="meanings" id="meanings"></div>
  </div>

  <div class="footer-note">僅供參考娛樂,人生的路仍要靠自己走。</div>
</div>

<script>
const FOUR_CARDS = [
  {
    key: "angel",
    glyph: "使",
    name: "天使",
    text: "貴人將至,好運悄然降臨。放下疑慮,順勢而為,近期心願有機會逐步實現。"
  },
  {
    key: "devil",
    glyph: "魔",
    name: "惡魔",
    text: "誘惑當前,容易被短期慾望牽著走。凡事三思,克制衝動,避免因小失大。"
  },
  {
    key: "poverty",
    glyph: "貧",
    name: "貧窮",
    text: "財務上宜謹慎守成,近期不適合大額投資或借貸,量入為出方能安穩度過。"
  },
  {
    key: "wealth",
    glyph: "財",
    name: "財神",
    text: "財運亨通,是把握機會、積極行動的好時機,投資或合作皆有斬獲的可能。"
  }
];

function drawCard() {
  const area = document.getElementById('cardsArea');
  const meaningsEl = document.getElementById('meanings');
  area.innerHTML = '';
  meaningsEl.innerHTML = '';

  const card = FOUR_CARDS[Math.floor(Math.random() * FOUR_CARDS.length)];

  const cardEl = document.createElement('div');
  cardEl.className = 'tarot-card';
  cardEl.innerHTML = `
    <div class="inner">
      <div class="face front"><span>✦</span></div>
      <div class="face back ${card.key}">
        <div class="glyph">${card.glyph}</div>
        <div class="cname">${card.name}</div>
      </div>
    </div>
  `;
  cardEl.addEventListener('click', () => {
    cardEl.classList.toggle('flipped');
  });

  area.appendChild(cardEl);

  const item = document.createElement('div');
  item.className = 'meaning-item';
  item.innerHTML = `
    <div class="head">${card.name}</div>
    <div class="body">${card.text}</div>
  `;
  meaningsEl.appendChild(item);
}
</script>
</body>
</html>
