<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xuanyi Mingli · 玄怡命理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    background: #0d1220;
    width: 100%;
    min-height: 100%;
  }

  .hero-frame {
    position: relative;
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    line-height: 0;
  }

  .hero-frame img {
    width: 100%;
    height: auto;
    display: block;
  }

  .hotspot {
    position: absolute;
    top: 62%;
    height: 29%;
    display: block;
    border-radius: 4%;
    -webkit-tap-highlight-color: rgba(230, 199, 138, 0.25);
  }

  .hotspot:hover,
  .hotspot:focus-visible {
    outline: 2px solid rgba(230, 199, 138, 0.6);
    outline-offset: -2px;
  }

  .hotspot.bazi      { left: 4.5%;  width: 21%; }
  .hotspot.tarot     { left: 27.5%; width: 21%; }
  .hotspot.horoscope { left: 51%;   width: 21%; }
  .hotspot.mingli    { left: 74.5%; width: 21%; }
</style>
</head>
<body>

  <div class="hero-frame">
    <img src="hero.jpg" alt="玄怡命理 · 洞悉命運,指引未來 · 八字排盤、塔羅占卜、星座運勢、生命靈數">

    <a class="hotspot bazi" href="bazi.html" aria-label="八字排盤"></a>
    <a class="hotspot tarot" href="tarot.html" aria-label="塔羅占卜"></a>
    <a class="hotspot horoscope" href="horoscope.html" aria-label="星座運勢"></a>
    <a class="hotspot mingli" href="mingli.html" aria-label="生命靈數"></a>
  </div>

</body>
</html>
