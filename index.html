<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xuanyi Mingli · 玄怡命理</title>
<link rel="stylesheet" href="style.css">
<style>
  .hero {
    width: 100%;
    max-width: 720px;
    margin: 0 auto;
    display: block;
    border-radius: 0 0 24px 24px;
    box-shadow: 0 16px 40px rgba(0,0,0,0.5);
  }
  .hero-wrap {
    text-align: center;
    padding-bottom: 4px;
  }

  /* 手機螢幕:限制圖片高度,避免要滑很久才看到功能卡片 */
  @media (max-width: 600px) {
    .hero-wrap {
      max-height: 62vh;
      overflow: hidden;
      border-radius: 0 0 20px 20px;
    }
    .hero {
      border-radius: 0 0 20px 20px;
      object-fit: cover;
      object-position: top center;
      height: 62vh;
    }
    .topbar {
      flex-wrap: wrap;
      gap: 8px;
    }
  }
</style>
</head>
<body>

<div class="hero-wrap">
  <img class="hero" src="hero.jpg" alt="玄怡命理 · 洞悉命運,指引未來">
</div>

<div class="page">

  <div class="topbar" style="border-top:1px solid var(--border);padding-top:22px;">
    <div>
      <div class="logo brush">玄怡命理</div>
      <div style="font-size:12px;color:var(--muted);letter-spacing:0.1em;">XUANYI MINGLI</div>
    </div>
    <div style="font-size:13px;color:var(--muted)">命理 · 玄學 · 占卜</div>
  </div>

  <div class="card">
    <h1 class="brush" style="font-size:32px;">一念起,萬象生</h1>
    <p style="color:var(--muted);line-height:1.8;">
      選擇一門你想探問的學問,輸入資料,靜心片刻,答案自會浮現。
    </p>
  </div>

  <div class="tool-grid">

    <a class="tool-card" href="bazi.html">
      <span class="glyph">命</span>
      <div class="name">八字排盤</div>
      <div class="desc">輸入出生年月日時,推算年柱、月柱、日柱、時柱與五行分布。</div>
    </a>

    <a class="tool-card" href="tarot.html">
      <span class="glyph">卜</span>
      <div class="name">塔羅占卜</div>
      <div class="desc">默想你的問題,抽取一張或三張牌,揭示過去、現在與未來。</div>
    </a>

    <a class="tool-card" href="horoscope.html">
      <span class="glyph">星</span>
      <div class="name">星座運勢</div>
      <div class="desc">選擇你的星座,查看今日在事業、愛情、財運上的指引。</div>
    </a>

    <a class="tool-card" href="mingli.html">
      <span class="glyph">數</span>
      <div class="name">生命靈數</div>
      <div class="desc">依出生日期推算你的生命靈數,了解天賦與課題。</div>
    </a>

  </div>

  <div class="footer-note">僅供參考娛樂,人生的路仍要靠自己走。</div>

</div>
</body>
</html>
